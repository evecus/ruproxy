name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号 (例如: v1.0.0)'
        required: true
        default: 'v0.1.0'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: ruproxy-linux-musl-amd64
            cross: true
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ruproxy-linux-glibc-amd64
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: ruproxy-linux-musl-arm64
            cross: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ruproxy-linux-glibc-arm64
            cross: true

    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}
      - name: Rename artifact
        run: |
          cp target/${{ matrix.target }}/release/ruproxy ${{ matrix.artifact }}
          chmod +x ${{ matrix.artifact }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # ── Release 任务 ────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Delete old test release and tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 删除 release（忽略不存在的情况）
          gh release delete test --yes 2>/dev/null || true
          # 删除 tag（忽略不存在的情况）
          git push origin --delete refs/tags/test 2>/dev/null || true

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Prepare Assets
        run: |
          mkdir -p release_assets
          # 1. 复制所有二进制文件到发布目录
          cp dist/ruproxy-* release_assets/
          
          # 2. 复制配置文件并重命名（如果需要包含在 Release 页面供下载）
          cp config.toml release_assets/config.toml
          
          echo "Assets prepared in release_assets/:"
          ls -R release_assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ruproxy ${{ github.event.inputs.version }}
          draft: false
          prerelease: ${{ contains(github.event.inputs.version, '-') }}
          generate_release_notes: true
          # 直接发布目录下所有的文件
          files: |
            release_assets/ruproxy-*
            release_assets/config.yaml
