# ruproxy configuration
# Only fields relevant to your setup are needed.
# Omit a [hysteria2] or [vless] section entirely to disable that protocol.

# ── Logging (optional, default: info) ────────────────────────────────────────
[log]
level = "info"   # trace | debug | info | warn | error

# ── Hysteria2 ─────────────────────────────────────────────────────────────────
[hysteria2]
listen = "0.0.0.0:443"

[hysteria2.tls]
cert_path = "/etc/ssl/certs/server.crt"
key_path  = "/etc/ssl/private/server.key"
# self_signed_domain = "example.com"   # uncomment to auto-generate a self-signed cert

[hysteria2.auth]
type     = "password"
password = "your-strong-password-here"

# [hysteria2.bandwidth]          # optional — omit to use unlimited
# up   = "1000 mbps"

# [hysteria2.masquerade]         # optional
# type = "proxy"    #proxy or none
# [hysteria2.masquerade.proxy]
# url          = "https://example.com"
# rewrite_host = true

# ── TUIC ──────────────────────────────────────────────────────────────────────
# Remove or comment out this entire section to disable TUIC.
[tuic]
listen = "0.0.0.0:7443"
# IMPORTANT: TUIC in this implementation expects QUIC + ALPN = "h3".
# If client ALPN does not include "h3", handshake can fail with:
# "peer doesn't support any known protocol".

# UUID → password map. Add one entry per user.
# Generate a UUID with: uuidgen  (Linux/macOS) or  python3 -c "import uuid; print(uuid.uuid4())"
[tuic.users]
"xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" = "your-strong-password-here"
# "yyyyyyyy-yyyy-yyyy-yyyy-yyyyyyyyyyyy" = "another-user-password"

# TLS certificate. Put TLS under [tuic.tls] to avoid confusion with [tuic.users].
# [tuic.tls]
# cert_path = "/etc/ssl/certs/server.crt"
# key_path  = "/etc/ssl/private/server.key"
# or
# self_signed_domain = "tuic.local"   # domain name in the self-signed cert

# Optional tuning (shown with defaults, safe to omit):
# max_idle_time    = "30s"
# auth_timeout     = "3s"
# udp_timeout      = "30s"
# udp_relay_ipv6   = false
# max_udp_packet_size = 65535

# ── VLESS ─────────────────────────────────────────────────────────────────────
# Remove or comment out this entire section to disable VLESS.
[vless]
listen = "0.0.0.0:8443"
uuid   = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"

# Transport layer: tcp (default, can omit) or ws.
# Controls how bytes are carried — independent of TLS.
# [vless.transport]
# type    = "tcp"    # tcp | ws

# For WebSocket:
# [vless.transport]
# type    = "ws"
# ws_path = "/vless"
# ws_host = "your.domain.com"   # optional: enforce Host header

# TLS layer: omit entirely for plaintext.
# Two mutually exclusive types:

# ── Option A: standard TLS ────────────────────────────────────────────────────
[vless.tls]
type = "tls"
cert_path = "/etc/ssl/certs/server.crt"
key_path  = "/etc/ssl/private/server.key"
# self_signed_domain = "example.com"   # alternative to cert_path/key_path

# ── Option B: Reality ─────────────────────────────────────────────────────────
# [vless.tls]
# type        = "reality"
# private_key = "<base64-encoded x25519 private key>"
# public_key  = "<base64-encoded x25519 public key>"
# short_ids   = ["ef567890"]
# dest        = "example.com:443"
# server_name = "example.com"

[vmess]
listen = "0.0.0.0:9443"
uuid   = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"  # 替换为你的 UUID

# 可选：传输层，默认 TCP
# [vmess.transport]
# type    = "ws"         # tcp | ws
# ws_path = "/vmess"    # WebSocket 路径
# ws_host = "your.domain.com"  # 可选

# 可选：TLS 层，不填则明文
[vmess.tls]
cert_path = "/etc/ssl/certs/server.crt"
key_path  = "/etc/ssl/private/server.key"
# self_signed_domain = "example.com"  # 自动生成自签名证书的备选方案

[trojan]
listen   = "0.0.0.0:10443"
password = "your-strong-password-here"

# 可选：传输层，默认 TCP
# [trojan.transport]
# type    = "ws"
# ws_path = "/trojan"
# ws_host = "your.domain.com"

# 可选：TLS 层
[trojan.tls]
cert_path = "/etc/ssl/certs/server.crt"
key_path  = "/etc/ssl/private/server.key"
# self_signed_domain = "example.com"

# Shadowsocks + 纯 TCP
[shadowsocks]
listen   = "0.0.0.0:8388"
password = "my-secret"
method   = "aes-256-gcm"

# Shadowsocks + WebSocket + TLS
[shadowsocks]
listen   = "0.0.0.0:443"
password = "my-secret"
method   = "chacha20-ietf-poly1305"
[shadowsocks.transport]
type    = "ws"
ws_path = "/shadow"
[shadowsocks.tls]
cert_path = "/etc/certs/tls.crt"
key_path  = "/etc/certs/tls.key"

# VLESS + XHTTP（无 TLS）
[vless]
listen = "0.0.0.0:8080"
uuid   = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
[vless.transport]
type       = "xhttp"
xhttp_path = "/api"

# VMess + XHTTP + TLS
[vmess]
listen = "0.0.0.0:443"
uuid   = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
[vmess.transport]
type       = "xhttp"
xhttp_path = "/stream"
[vmess.tls]
cert_path = "/etc/certs/tls.crt"
key_path  = "/etc/certs/tls.key"
